access:
  direct_download: true
  api:
    exists: false
    usable: false
    endpoint: null
    auth_required: null
    auth_barriers: []
    notes: |
      2026-04-13 實測以下路徑全部回傳 HTTP 404：/api、/api/v1、/api/v2、
      /api/objects、/api/search、/api/collections、/graphql、/iiif、/manifest.json、/api/iiif
      平台以「開放」為名但無任何公開 API 介面，這是規模（117 萬件）與開放性之間顯著不匹配
  browse_available: true
  application_required: false
  login_required: false  # 一般瀏覽／下載個別藏品不需登入；plaza.openmuseum.tw 策展參與才需帳號

# 2026-04-13 實測 /howto 原文：14 種授權／權利標示，分 4 大類
license:
  type: 多重授權／權利標示混用（14 種）
  version: null
  free_reuse: false  # 整體而言為 false——含 NC/ND/僅限瀏覽等非完全開放標示
  collective_rights: none
  mixed: true
  url: https://openmuseum.tw/howto
  notes: |
    平台明文「開放博物館並不擁有平台上任何藏品的智慧財產權」——所有授權標示由貢獻者決定，
    平台僅提供結構化標示系統。2026-04-13 實測 /howto 原文，14 種標示分四類：

    **可自由使用（5 種）**：
    - PDM 公眾領域標章
    - CC0 公眾領域貢獻宣告
    - CC BY 3.0 TW
    - CC BY-SA 3.0 TW
    - OGDL 政府資料開放授權條款第 1 版

    **有條件的開放使用（4 種）**：
    - CC BY-NC 3.0 TW
    - CC BY-ND 3.0 TW
    - CC BY-NC-ND 3.0 TW
    - CC BY-NC-SA 3.0 TW

    **僅能於本網站使用（2 種）**：
    - 著作權利所有-姓名標示-非商業性的教育與研究使用
    - 著作權利所有-可用於本站提供的服務

    **僅能瀏覽（3 種）**：
    - 著作權利不明-未經實質評估（COPYRIGHT NOT EVALUATED）
    - 著作權利不明-重要評量要素未明（COPYRIGHT UNDETERMINED）
    - 著作權利所有

    另含參照外部機構聲明的 2 種：國會圖書館權利聲明、拉法葉學院數位資料使用指南。

    **未見任何原住民族特定條款**——與 TCMB 同樣零關注集體權利，即使有原住民族相關藏品。

update_frequency: 持續累積；由貢獻機構提交新藏品；2020-2025 連年舉辦「博物館日」活動顯示活躍維運

